{{define "content"}}
<div class="grid-2">
  <div class="stack">
    <div class="card">
      <div class="card-title">Account</div>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
        <div style="width:48px;height:48px;border-radius:50%;background:var(--accent-light);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--accent)">
          {{initial .CurrentUser.Name}}
        </div>
        <div>
          <div style="font-size:15px;font-weight:600">{{.CurrentUser.Name}}</div>
          <div style="font-size:12px;color:var(--text-muted)">{{.CurrentUser.Email}}</div>
          <span class="badge {{if eq .CurrentUser.Role "admin"}}badge-red{{else if eq .CurrentUser.Role "organizer"}}badge-purple{{else}}badge-gray{{end}}" style="margin-top:4px;display:inline-block">{{.CurrentUser.Role}}</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Change password</div>
      <form method="POST" action="/profile/password" class="row">
        <input type="password" name="password" placeholder="New password" required minlength="8" style="flex:1">
        <button type="submit" class="btn btn-primary btn-sm">Save</button>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Out of office</div>

    <div id="ooo-list" style="margin-bottom:16px">
      {{template "ooo_list" .}}
    </div>

    <hr class="divider">

    <form hx-post="/profile/ooo"
          hx-target="#ooo-list"
          hx-swap="outerHTML"
          class="stack-sm">
      <div class="grid-2">
        <div class="form-group">
          <label>From</label>
          <input type="date" name="from" required>
        </div>
        <div class="form-group">
          <label>To</label>
          <input type="date" name="to" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-sm">Add period</button>
    </form>
  </div>
</div>
{{end}}
