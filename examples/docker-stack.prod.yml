services:
  traefik:
    image: traefik:v3.0
    command:
      - --providers.swarm=true
      - --providers.swarm.exposedbydefault=false
      - --providers.swarm.network=traefik
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --log.level=INFO
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik

  app:
    image: ghcr.io/robinlant/occurance-management:latest
    environment:
      - GIN_MODE=release
      - SESSION_SECRET=change-me-use-a-long-random-secret
    volumes:
      - dutyround_data:/data
    networks:
      - traefik
    deploy:
      labels:
        - traefik.enable=true
        - traefik.http.routers.dutyround.rule=PathPrefix(`/`)
        - traefik.http.routers.dutyround.entrypoints=websecure
        - traefik.http.routers.dutyround.tls=true
        - traefik.http.services.dutyround.loadbalancer.server.port=8080

networks:
  traefik:
    driver: overlay

volumes:
  dutyround_data:
